<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="Рампы разгрузочные">
  <defs>
    <linearGradient id="sky8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef5fb"/><stop offset="1" stop-color="#cfe0ee"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#sky8)"/>
  <rect y="360" width="640" height="60" fill="#cfc6b6"/>
  <rect y="356" width="640" height="6" fill="#b7ad9c"/>

  <!-- warehouse wall + dock -->
  <rect x="380" y="80" width="260" height="280" fill="#dfe5ea"/>
  <rect x="380" y="80" width="10" height="280" fill="#c4ccd2"/>
  <rect x="430" y="120" width="170" height="150" fill="#6b7a86" stroke="#46545f" stroke-width="4"/>
  <!-- shutter lines -->
  <g stroke="#56656f" stroke-width="2">
    <line x1="430" y1="145" x2="600" y2="145"/><line x1="430" y1="170" x2="600" y2="170"/>
    <line x1="430" y1="195" x2="600" y2="195"/><line x1="430" y1="220" x2="600" y2="220"/>
    <line x1="430" y1="245" x2="600" y2="245"/>
  </g>

  <!-- raised dock platform -->
  <rect x="380" y="270" width="220" height="90" fill="#8b9aa6"/>
  <rect x="380" y="270" width="220" height="10" fill="#5a6b78"/>

  <!-- inclined loading ramp (steel) -->
  <polygon points="120,360 380,278 380,300 150,360" fill="#7d909e" stroke="#46545f" stroke-width="3"/>
  <!-- ramp tread lines -->
  <g stroke="#46545f" stroke-width="2">
    <line x1="170" y1="345" x2="200" y2="335"/>
    <line x1="220" y1="332" x2="250" y2="322"/>
    <line x1="270" y1="319" x2="300" y2="309"/>
    <line x1="320" y1="306" x2="350" y2="296"/>
  </g>
  <!-- support legs under ramp -->
  <g stroke="#46545f" stroke-width="6">
    <line x1="230" y1="345" x2="230" y2="360"/>
    <line x1="320" y1="322" x2="320" y2="360"/>
  </g>
  <!-- side safety rail -->
  <g stroke="#f26522" stroke-width="5" stroke-linecap="round">
    <line x1="150" y1="335" x2="380" y2="252"/>
    <line x1="150" y1="335" x2="150" y2="358"/>
    <line x1="235" y1="305" x2="235" y2="328"/>
    <line x1="320" y1="275" x2="320" y2="298"/>
  </g>
</svg>
