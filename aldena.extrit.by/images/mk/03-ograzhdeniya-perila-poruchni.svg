<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="Ограждения, перила, поручни">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef5fb"/><stop offset="1" stop-color="#cfe0ee"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#sky3)"/>
  <rect y="360" width="640" height="60" fill="#cfc6b6"/>
  <rect y="356" width="640" height="6" fill="#b7ad9c"/>

  <!-- top handrail (поручень) -->
  <rect x="70" y="120" width="500" height="14" rx="7" fill="#f26522"/>
  <!-- bottom rail -->
  <rect x="80" y="330" width="480" height="10" fill="#46545f"/>

  <!-- posts -->
  <g fill="#46545f">
    <rect x="90" y="126" width="13" height="210"/>
    <rect x="305" y="126" width="13" height="210"/>
    <rect x="520" y="126" width="13" height="210"/>
  </g>

  <!-- vertical balusters -->
  <g fill="#8b9aa6">
    <rect x="130" y="132" width="7" height="200"/>
    <rect x="165" y="132" width="7" height="200"/>
    <rect x="200" y="132" width="7" height="200"/>
    <rect x="235" y="132" width="7" height="200"/>
    <rect x="270" y="132" width="7" height="200"/>
    <rect x="345" y="132" width="7" height="200"/>
    <rect x="380" y="132" width="7" height="200"/>
    <rect x="415" y="132" width="7" height="200"/>
    <rect x="450" y="132" width="7" height="200"/>
    <rect x="485" y="132" width="7" height="200"/>
  </g>
  <!-- mid horizontal rail -->
  <rect x="80" y="226" width="480" height="6" fill="#aab8c2"/>

  <!-- base plates -->
  <g fill="#46545f">
    <rect x="82" y="356" width="29" height="6"/>
    <rect x="297" y="356" width="29" height="6"/>
    <rect x="512" y="356" width="29" height="6"/>
  </g>
</svg>
