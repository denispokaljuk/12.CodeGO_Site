<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="Козырьки на стальном каркасе">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef5fb"/><stop offset="1" stop-color="#cfe0ee"/>
    </linearGradient>
    <linearGradient id="glass4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bfe0f2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#8fc4e0" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#sky4)"/>
  <rect y="362" width="640" height="58" fill="#cfc6b6"/>

  <!-- building wall -->
  <rect x="70" y="70" width="200" height="292" fill="#dfe5ea"/>
  <rect x="70" y="70" width="10" height="292" fill="#c4ccd2"/>
  <!-- door -->
  <rect x="120" y="210" width="110" height="152" fill="#6b7a86"/>
  <rect x="120" y="210" width="110" height="152" fill="none" stroke="#46545f" stroke-width="4"/>
  <line x1="175" y1="210" x2="175" y2="362" stroke="#46545f" stroke-width="3"/>

  <!-- canopy glass over door -->
  <polygon points="95,170 360,150 360,178 95,200" fill="url(#glass4)" stroke="#cfe7f5" stroke-width="2"/>
  <!-- canopy steel frame edge -->
  <line x1="95" y1="200" x2="360" y2="178" stroke="#46545f" stroke-width="6" stroke-linecap="round"/>
  <line x1="95" y1="170" x2="360" y2="150" stroke="#5a6b78" stroke-width="4" stroke-linecap="round"/>
  <!-- support struts (steel frame) -->
  <g stroke="#f26522" stroke-width="7" stroke-linecap="round">
    <line x1="95" y1="120" x2="200" y2="190"/>
    <line x1="100" y1="120" x2="340" y2="166"/>
  </g>
  <g stroke="#46545f" stroke-width="6" stroke-linecap="round">
    <line x1="90" y1="120" x2="95" y2="200"/>
  </g>
  <!-- frame ribs under canopy -->
  <g stroke="#7d909e" stroke-width="3">
    <line x1="150" y1="187" x2="155" y2="165"/>
    <line x1="220" y1="181" x2="225" y2="159"/>
    <line x1="290" y1="175" x2="295" y2="153"/>
  </g>
</svg>
